<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة التمارين</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Tajawal", Arial, sans-serif;
      background: #f8fafc;
    }
    .hero-gradient {
      background: linear-gradient(135deg, #1a365d 0%, #2d3748 100%);
    }
  </style>
</head>
<body class="min-h-screen text-right">

  <header class="bg-white shadow-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col lg:flex-row items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-blue-900">لوحة التحكم الخاصة بك</h1>
        <p class="text-sm text-gray-600">رفع التمارين لكل روضة على حدة</p>
      </div>

      <div class="flex flex-wrap gap-3">
        <a href="index.html" class="bg-gray-200 text-gray-800 px-5 py-2 rounded-full font-medium hover:bg-gray-300">
          العودة للموقع
        </a>
        <button id="refreshBtn" class="bg-blue-900 text-white px-5 py-2 rounded-full font-medium hover:bg-blue-800">
          تحديث القائمة
        </button>
      </div>
    </div>
  </header>

  <section class="hero-gradient text-white py-12">
    <div class="max-w-5xl mx-auto px-4 text-center">
      <h2 class="text-4xl md:text-5xl font-bold mb-4">إضافة تمرين جديد</h2>
      <p class="text-lg opacity-90">HTML + CSS + JS + صور + أصوات</p>
      <p id="topStatus" class="mt-4 text-sm font-medium text-gray-200">جاهز</p>
    </div>
  </section>

  <section class="py-8">
    <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 xl:grid-cols-3 gap-6">

      <!-- نموذج الإضافة -->
      <div class="xl:col-span-1">
        <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
          <h3 class="text-2xl font-bold text-blue-900 mb-5">بيانات التمرين</h3>

          <div class="space-y-4">
            <input id="title" type="text" placeholder="عنوان التمرين" class="w-full px-4 py-3 rounded-xl border border-gray-300">

            <select id="kindergarten" class="w-full px-4 py-3 rounded-xl border border-gray-300">
              <option value="kg1">kg1</option>
              <option value="kg2">kg2</option>
            </select>

            <input id="pageNumber" type="number" min="1" placeholder="رقم الصفحة" class="w-full px-4 py-3 rounded-xl border border-gray-300">

            <select id="stage" class="w-full px-4 py-3 rounded-xl border border-gray-300">
              <option value="">اختر المرحلة</option>
              <option value="tamheedi">التمهيدي</option>
              <option value="tahdiri">التحضيري</option>
            </select>

            <select id="subject" class="w-full px-4 py-3 rounded-xl border border-gray-300">
              <option value="">اختر المادة</option>
              <option value="arabic">العربي</option>
              <option value="math">الرياضيات</option>
              <option value="english">الإنجليزي</option>
            </select>

            <input id="sortOrder" type="number" min="1" placeholder="الترتيب" class="w-full px-4 py-3 rounded-xl border border-gray-300">

            <select id="isActive" class="w-full px-4 py-3 rounded-xl border border-gray-300">
              <option value="true">مفعل</option>
              <option value="false">غير مفعل</option>
            </select>
          </div>

          <h4 class="text-lg font-bold text-blue-900 mt-6 mb-3">ملفات التمرين</h4>

          <div class="space-y-3">
            <div>
              <label class="block mb-2 font-medium text-gray-700">ملف HTML</label>
              <input id="htmlFile" type="file" accept=".html,.htm" class="w-full px-3 py-3 rounded-xl border border-gray-300 bg-white">
            </div>

            <div>
              <label class="block mb-2 font-medium text-gray-700">ملف CSS</label>
              <input id="cssFile" type="file" accept=".css" class="w-full px-3 py-3 rounded-xl border border-gray-300 bg-white">
            </div>

            <div>
              <label class="block mb-2 font-medium text-gray-700">ملف JS</label>
              <input id="jsFile" type="file" accept=".js" class="w-full px-3 py-3 rounded-xl border border-gray-300 bg-white">
            </div>

            <div>
              <label class="block mb-2 font-medium text-gray-700">الصور</label>
              <input id="images" type="file" accept="image/*" multiple class="w-full px-3 py-3 rounded-xl border border-gray-300 bg-white">
            </div>

            <div>
              <label class="block mb-2 font-medium text-gray-700">الأصوات</label>
              <input id="audio" type="file" accept="audio/*" multiple class="w-full px-3 py-3 rounded-xl border border-gray-300 bg-white">
            </div>
          </div>

          <div class="mt-5">
            <label class="block mb-2 font-medium text-gray-700">اختياري: كود مباشر بدل الملفات</label>
            <textarea id="code" rows="8" placeholder="الصق هنا كود HTML مباشر إذا أردت..." class="w-full px-4 py-3 rounded-xl border border-gray-300 font-mono text-sm"></textarea>
          </div>

          <div class="mt-6 flex gap-3">
            <button id="saveBtn" class="bg-blue-900 text-white px-6 py-3 rounded-xl font-medium hover:bg-blue-800">
              حفظ التمرين
            </button>
            <button id="clearBtn" class="bg-gray-200 text-gray-800 px-6 py-3 rounded-xl font-medium hover:bg-gray-300">
              تفريغ
            </button>
          </div>

          <p id="status" class="mt-4 text-sm font-medium text-gray-700"></p>
        </div>
      </div>

      <!-- قائمة التمارين -->
      <div class="xl:col-span-2 space-y-6">
        <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
          <div class="flex flex-col md:flex-row items-center justify-between gap-4 mb-5">
            <h3 class="text-2xl font-bold text-blue-900">التمارين المحفوظة</h3>

            <select id="filterKg" class="px-4 py-2 rounded-xl border border-gray-300">
              <option value="">كل الروضات</option>
              <option value="kg1">kg1</option>
              <option value="kg2">kg2</option>
            </select>
          </div>

          <div id="exercisesList" class="space-y-4"></div>
        </div>
      </div>

    </div>
  </section>

  <script src="https://unpkg.com/imagekit-javascript/dist/imagekit.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      where,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDc7oMkTNbVhv4DdvzHDwr-be6ABX5PD1o",
      authDomain: "kindergarten-platform-ae4ff.firebaseapp.com",
      projectId: "kindergarten-platform-ae4ff",
      storageBucket: "kindergarten-platform-ae4ff.appspot.com",
      messagingSenderId: "519219144872",
      appId: "1:519219144872:web:b1cf7c80e25267ae58fa9d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const imagekit = new ImageKit({
      publicKey: "public_fIq3c5Rdn2bk/TXtiEr6bGGyPmI=",
      urlEndpoint: "https://ik.imagekit.io/m8jbt4a6ug",
      authenticationEndpoint: "https://kindergarten-site.vercel.app/api/upload-auth"
    });

    const topStatus = document.getElementById("topStatus");
    const refreshBtn = document.getElementById("refreshBtn");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");
    const filterKg = document.getElementById("filterKg");
    const exercisesList = document.getElementById("exercisesList");
    const statusEl = document.getElementById("status");

    const titleEl = document.getElementById("title");
    const kindergartenEl = document.getElementById("kindergarten");
    const pageNumberEl = document.getElementById("pageNumber");
    const stageEl = document.getElementById("stage");
    const subjectEl = document.getElementById("subject");
    const sortOrderEl = document.getElementById("sortOrder");
    const isActiveEl = document.getElementById("isActive");
    const codeEl = document.getElementById("code");

    const htmlFileEl = document.getElementById("htmlFile");
    const cssFileEl = document.getElementById("cssFile");
    const jsFileEl = document.getElementById("jsFile");
    const imagesEl = document.getElementById("images");
    const audioEl = document.getElementById("audio");

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function stageLabel(v) {
      return v === "tamheedi" ? "التمهيدي" : v === "tahdiri" ? "التحضيري" : v || "-";
    }

    function subjectLabel(v) {
      return v === "arabic" ? "العربي" : v === "math" ? "الرياضيات" : v === "english" ? "الإنجليزي" : v || "-";
    }

    function setStatus(message, type = "normal") {
      statusEl.textContent = message;
      statusEl.className = "mt-4 text-sm font-medium";
      if (type === "error") statusEl.classList.add("text-red-600");
      else if (type === "success") statusEl.classList.add("text-green-600");
      else if (type === "loading") statusEl.classList.add("text-blue-700");
      else statusEl.classList.add("text-gray-700");
    }

    function clearForm() {
      titleEl.value = "";
      pageNumberEl.value = "";
      stageEl.value = "";
      subjectEl.value = "";
      sortOrderEl.value = "";
      isActiveEl.value = "true";
      codeEl.value = "";
      htmlFileEl.value = "";
      cssFileEl.value = "";
      jsFileEl.value = "";
      imagesEl.value = "";
      audioEl.value = "";
      setStatus("");
    }

    async function uploadFile(file, folder) {
      return new Promise((resolve, reject) => {
        imagekit.upload(
          {
            file,
            fileName: file.name,
            folder
          },
          function (err, result) {
            if (err) reject(err);
            else {
              resolve({
                name: file.name,
                url: result.url,
                fileId: result.fileId
              });
            }
          }
        );
      });
    }

    async function uploadMultiple(files, folder) {
      const results = [];
      for (const file of files) {
        const uploaded = await uploadFile(file, folder);
        results.push(uploaded);
      }
      return results;
    }

    async function saveExercise() {
      const title = titleEl.value.trim();
      const kindergartenId = kindergartenEl.value;
      const pageNumber = pageNumberEl.value.trim();
      const stage = stageEl.value;
      const subject = subjectEl.value;
      const sortOrder = Number(sortOrderEl.value || 1);
      const isActive = isActiveEl.value === "true";
      const code = codeEl.value.trim();

      const htmlFile = htmlFileEl.files[0];
      const cssFile = cssFileEl.files[0];
      const jsFile = jsFileEl.files[0];
      const imageFiles = Array.from(imagesEl.files || []);
      const audioFiles = Array.from(audioEl.files || []);

      if (!title || !kindergartenId || !pageNumber || !stage || !subject) {
        setStatus("عبّي العنوان والروضة والمرحلة والمادة ورقم الصفحة", "error");
        return;
      }

      if (!code && !htmlFile) {
        setStatus("لازم تضيف كود مباشر أو ملف HTML على الأقل", "error");
        return;
      }

      try {
        setStatus("جاري رفع الملفات...", "loading");
        topStatus.textContent = "جاري رفع ملفات التمرين...";

        const folder = `/kindergarten-exercises/${kindergartenId}/${stage}/${subject}/page-${pageNumber}`;

        let filesPayload = {};
        let uploadMode = "code";

        if (htmlFile || cssFile || jsFile || imageFiles.length || audioFiles.length) {
          uploadMode = "files";

          if (htmlFile) {
            filesPayload.html = await uploadFile(htmlFile, folder);
          }

          if (cssFile) {
            filesPayload.css = await uploadFile(cssFile, folder);
          }

          if (jsFile) {
            filesPayload.js = await uploadFile(jsFile, folder);
          }
        }

        const uploadedImages = await uploadMultiple(imageFiles, `${folder}/images`);
        const uploadedAudio = await uploadMultiple(audioFiles, `${folder}/audio`);

        setStatus("جاري حفظ التمرين في Firebase...", "loading");

        await addDoc(collection(db, "interactive_pages"), {
          title,
          kindergartenId,
          pageNumber: Number(pageNumber),
          stage,
          subject,
          sortOrder,
          isActive,
          uploadMode,
          code: code || "",
          files: filesPayload,
          images: uploadedImages,
          audioFiles: uploadedAudio,
          createdAt: Date.now()
        });

        setStatus("تم حفظ التمرين بنجاح 🔥", "success");
        topStatus.textContent = "تم حفظ التمرين بنجاح";
        clearForm();
        await loadExercises();
      } catch (error) {
        console.error(error);
        setStatus("فشل حفظ التمرين أو رفع الملفات", "error");
        topStatus.textContent = "حدث خطأ أثناء الحفظ";
      }
    }

    async function loadExercises() {
      exercisesList.innerHTML = `<p class="text-gray-500">جاري تحميل التمارين...</p>`;

      try {
        let qRef = collection(db, "interactive_pages");
        const selectedKg = filterKg.value;

        let snapshot;
        if (selectedKg) {
          snapshot = await getDocs(query(qRef, where("kindergartenId", "==", selectedKg)));
        } else {
          snapshot = await getDocs(qRef);
        }

        if (snapshot.empty) {
          exercisesList.innerHTML = `<p class="text-gray-500">لا توجد تمارين محفوظة</p>`;
          return;
        }

        const docs = snapshot.docs
          .map(doc => ({ id: doc.id, ...doc.data() }))
          .sort((a, b) => Number(a.pageNumber || 0) - Number(b.pageNumber || 0));

        exercisesList.innerHTML = docs.map(item => `
          <div class="border border-gray-200 rounded-2xl p-5">
            <div class="flex flex-col md:flex-row justify-between gap-4">
              <div>
                <h4 class="text-lg font-bold text-blue-900">${escapeHtml(item.title || "بدون عنوان")}</h4>
                <p class="text-gray-600">Document ID: ${item.id}</p>
                <p class="text-gray-600">الروضة: ${escapeHtml(item.kindergartenId || "-")}</p>
                <p class="text-gray-600">المرحلة: ${escapeHtml(stageLabel(item.stage))}</p>
                <p class="text-gray-600">المادة: ${escapeHtml(subjectLabel(item.subject))}</p>
                <p class="text-gray-600">رقم الصفحة: ${item.pageNumber ?? "-"}</p>
                <p class="text-gray-600">نوع الرفع: ${escapeHtml(item.uploadMode || "code")}</p>
                <p class="text-gray-600">الحالة: ${item.isActive ? "مفعل" : "غير مفعل"}</p>
              </div>

              <div class="grid grid-cols-1 gap-2 text-sm">
                <div class="bg-gray-50 rounded-xl px-4 py-2">HTML: ${item.files?.html?.url ? "موجود" : "غير موجود"}</div>
                <div class="bg-gray-50 rounded-xl px-4 py-2">CSS: ${item.files?.css?.url ? "موجود" : "غير موجود"}</div>
                <div class="bg-gray-50 rounded-xl px-4 py-2">JS: ${item.files?.js?.url ? "موجود" : "غير موجود"}</div>
                <div class="bg-gray-50 rounded-xl px-4 py-2">صور: ${(item.images || []).length}</div>
                <div class="bg-gray-50 rounded-xl px-4 py-2">أصوات: ${(item.audioFiles || []).length}</div>
              </div>
            </div>
          </div>
        `).join("");
      } catch (error) {
        console.error(error);
        exercisesList.innerHTML = `<p class="text-red-600">حدث خطأ أثناء تحميل التمارين</p>`;
      }
    }

    saveBtn.addEventListener("click", saveExercise);
    clearBtn.addEventListener("click", clearForm);
    refreshBtn.addEventListener("click", loadExercises);
    filterKg.addEventListener("change", loadExercises);

    loadExercises();
  </script>
</body>
</html>
